<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль | ФЕНИКС</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',sans-serif;
            background-image: url('/static/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height:100vh;
            padding:20px;
            position:relative;
        }
        body::before{
            content:'';
            position:absolute;
            top:0;
            left:0;
            right:0;
            bottom:0;
            background:rgba(0,0,0,0.65);
            z-index:0;
        }
        .container{max-width:800px;margin:0 auto;position:relative;z-index:1}
        .nav{background:rgba(20,25,40,0.9);padding:12px 20px;border-radius:60px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap}
        .nav a{color:#d0d0e0;text-decoration:none;padding:6px 16px;border-radius:30px}
        .nav a:hover{background:#ff8c00;color:#0a0f1a}
        .card{background:rgba(20,25,40,0.95);border-radius:20px;padding:25px;border:1px solid rgba(255,140,0,0.2);backdrop-filter:blur(5px)}
        h2{color:#ff8c00;margin-bottom:20px;border-left:4px solid #ff8c00;padding-left:15px}
        input,button{width:100%;padding:12px;margin:10px 0;border-radius:10px;background:rgba(10,15,25,0.8);border:2px solid rgba(255,140,0,0.3);color:white}
        button{background:linear-gradient(135deg,#ff8c00,#ff4500);border:none;cursor:pointer;font-weight:600}
        .info{background:rgba(255,140,0,0.1);padding:15px;border-radius:12px;margin-bottom:20px}
        .info p{margin:8px 0;color:#d0d0e0}
        .nickname-display{font-size:24px;color:#ff8c00;font-weight:bold}
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/chat">💬 Чат</a>
            <a href="/reprimands">⚠️ Выговоры</a>
            <a href="/lateness">⏰ Опоздания</a>
            <a href="/flag_duty">🎌 Флаг</a>
            <a href="/schedule">📚 Занятия</a>
            <a href="/profile" style="background:rgba(255,140,0,0.2);color:#ff8c00">👤 Профиль</a>
            {% if session.can_manage_users %}<a href="/users">👥 Управление</a>{% endif %}
            <a href="/logout">🚪 Выход</a>
        </div>

        <div class="card">
            <h2>👤 Мой профиль</h2>
            
            <div class="info">
                <p><strong>ФИО:</strong> {{ user[0] }}</p>
                <p><strong>Должность:</strong> {{ user[1] }}</p>
                <p><strong>Отделение:</strong> {{ user[2] }}</p>
                <p><strong>Позывной:</strong> <span class="nickname-display">{{ user_nickname }}</span></p>
            </div>
            
            <form method="post">
                <input type="text" name="nickname" placeholder="Позывной" value="{{ user[3] or user[0] }}">
                <button type="submit">💾 Сохранить позывной</button>
            </form>
        </div>
    </div>
</body>
</html>
