<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход | ФЕНИКС</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff8c00">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',sans-serif;
            background-image: url('/static/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            position:relative;
        }
        body::before{
            content:'';
            position:absolute;
            top:0;
            left:0;
            right:0;
            bottom:0;
            background:rgba(0,0,0,0.65);
            z-index:0;
        }
        .login-container{width:100%;max-width:450px;animation:fadeInUp 0.6s ease-out;position:relative;z-index:1}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .card{background:rgba(20,25,40,0.95);backdrop-filter:blur(10px);border-radius:24px;padding:40px 35px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);border:1px solid rgba(255,140,0,0.3)}
        .logo{text-align:center;margin-bottom:25px}
        .phoenix{font-size:70px;background:linear-gradient(135deg,#ff8c00,#ff4500);-webkit-background-clip:text;background-clip:text;color:transparent;animation:glow 2s ease-in-out infinite}
        @keyframes glow{0%,100%{text-shadow:0 0 20px rgba(255,140,0,0.3)}50%{text-shadow:0 0 40px rgba(255,140,0,0.6)}}
        h2{text-align:center;color:#ff8c00;font-size:32px;margin-bottom:8px}
        .subtitle{text-align:center;color:#a0a0b0;font-size:13px;margin-bottom:30px;border-bottom:1px solid rgba(255,140,0,0.3);display:inline-block;padding-bottom:10px}
        .input-group{margin-bottom:20px}
        .input-group label{display:block;margin-bottom:8px;color:#d0d0e0}
        .input-group input{width:100%;padding:14px 16px;border:2px solid rgba(255,140,0,0.3);border-radius:14px;background:rgba(10,15,25,0.8);color:white}
        .input-group input:focus{outline:none;border-color:#ff8c00}
        button{width:100%;padding:14px;background:linear-gradient(135deg,#ff8c00,#ff4500);color:white;border:none;border-radius:14px;font-weight:600;cursor:pointer}
        .error{background:rgba(220,53,69,0.2);color:#ff6b6b;padding:12px;border-radius:12px;margin-top:20px;text-align:center}
        .footer{text-align:center;margin-top:25px;font-size:11px;color:#606070}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="logo"><div class="phoenix">🐦‍🔥</div></div>
            <h2>ФЕНИКС</h2>
            <div style="text-align:center"><div class="subtitle">система управления</div></div>
            <form method="post">
                <div class="input-group"><label>🔐 Логин</label><input type="text" name="login" placeholder="Логин" required></div>
                <div class="input-group"><label>🔒 Пароль</label><input type="password" name="password" placeholder="Пароль" required></div>
                <button type="submit">➤ ВОЙТИ</button>
            </form>
            {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
            <div class="footer">⚡ только для служебного пользования</div>
        </div>
    </div>
</body>
</html>
